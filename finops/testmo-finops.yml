principles:
- name: Visibility
  description: Track the plan tier and count of activated users per month; the REST API itself is unmetered and adds no incremental charge.
- name: Allocation
  description: Map the single Testmo subscription and its activated seats to the QA/engineering teams that use it.
- name: Optimization
  description: Right-size the plan to actual activated users, deactivate unused seats before the monthly count, and choose annual billing for the 15 percent discount.
- name: Accountability
  description: Assign an owner for the Testmo subscription who reviews activated-user counts and tier thresholds each billing cycle.
