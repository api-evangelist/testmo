description: >-
  FinOps view of Testmo spend. Testmo is a hosted SaaS test management product
  billed as a flat monthly (or discounted annual) subscription per plan, driven
  by user tiers rather than by API usage. Team is a fixed 99 USD/month up to 10
  users; Business (399 USD/month) and Enterprise (599 USD/month) scale in tiers
  of 25 activated users. The REST API is included with the subscription and is
  not separately metered, so API consumption does not create incremental cost -
  the primary cost lever is the number of activated users and the plan tier. Cost
  optimization is therefore about right-sizing the plan and managing activated
  seats, not about throttling API calls.
notes: >-
  Per-user effective cost varies widely with headcount because plans are flat per
  tier; a small team on Business pays a high per-user rate while a full 25-user
  tier pays much less. Verify current rates on the Testmo pricing page and price
  list during reconciliation.
